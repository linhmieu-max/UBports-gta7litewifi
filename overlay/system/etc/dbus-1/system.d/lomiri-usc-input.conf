<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow Lomiri (uid 32011) to call USC Input interface -->
  <!-- Fixes: "Rejected send message" for setTouchpad*/setMouse* methods -->
  <policy user="phablet">
    <allow send_destination="com.lomiri.SystemCompositor.Input"
           send_interface="com.lomiri.SystemCompositor.Input"/>
  </policy>
  <policy at_console="true">
    <allow send_destination="com.lomiri.SystemCompositor.Input"
           send_interface="com.lomiri.SystemCompositor.Input"/>
  </policy>
</busconfig>
