# NetworkManager config for Samsung Galaxy Tab A7 Lite (gta7litewifi)
# MT8768 / wlan_drv_gen4m

[device]
# Force wlan0 to be managed by NetworkManager
# MTK wlan driver may start in unmanaged state
match-device=interface-name:wlan0
managed=true

[connectivity]
# Connectivity check — give WiFi time to associate on MTK
uri=http://connectivity-check.ubuntu.com/
interval=300
