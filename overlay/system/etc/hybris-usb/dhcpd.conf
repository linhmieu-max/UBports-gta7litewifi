# DHCP config for USB tethering on gta7litewifi
# Host gets 10.15.19.100, device is at 10.15.19.82

default-lease-time 3600;
max-lease-time 7200;

subnet 10.15.19.0 netmask 255.255.255.0 {
    range 10.15.19.100 10.15.19.110;
    option routers 10.15.19.82;
    option domain-name-servers 8.8.8.8, 8.8.4.4;
}
