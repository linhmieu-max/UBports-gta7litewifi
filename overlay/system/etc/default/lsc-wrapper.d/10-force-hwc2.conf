# unity-system-compositor / lomiri-system-compositor fixes
# gta7litewifi — MT8768 / PowerVR GE8320 — Halium 12

# Force HWComposer v2 API (Android 12 HAL requirement)
export MIR_ANDROID_FORCE_HWC2=1

# Fix dequeueBuffer broken_promise crash:
# USC log confirmed USC is called as: lomiri-system-compositor --enable-num-framebuffers
# USC_NUM_FRAMEBUFFERS is read by lsc-wrapper and passed as --enable-num-framebuffers=N
export USC_NUM_FRAMEBUFFERS=2

# Suppress libminisf.so lookup — not present, avoids 6s init delay
export HYBRIS_LIBMINISF_DISABLE=1

# PowerVR: bypass SurfaceFlinger fake service (not needed, causes dequeue contention)
export HYBRIS_SKIP_WAIT_FOR_FB_DEV=1
