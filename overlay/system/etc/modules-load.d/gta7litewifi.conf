# --- WMT connectivity stack (order: core → wifi → bt) ---
wmt_drv
wmt_chrdev_wifi
wlan_drv_gen4m

# --- Bluetooth ---
bt_drv

# --- GPS ---
gps_drv

# --- LTE Modem CCCI (SM-T225 only) ---
ccci_md_all

# --- ZRAM swap ---
zram

# --- MTK performance ---
fpsgo
met

# --- Misc ---
kheaders
